- fields:
    default_engine: true
    engine_name: Full Scan
    yaml_configuration: "subdomain_discovery: {\n  'uses_tools': ['subfinder', 'chaos',\
      \ 'ctfr', 'sublist3r', 'tlsx', 'oneforall', 'netlas'],\n  'enable_http_crawl':\
      \ true,\n  'threads': 30,\n  'timeout': 5,\n}\nhttp_crawl: {}\nport_scan: {\n\
      \  'enable_http_crawl': true,\n  'timeout': 5,\n  'ports': ['top-100'],\n  'rate_limit':\
      \ 150,\n  'threads': 30,\n  'passive': false\n}\nosint: {\n  'discover': ['emails',\
      \ 'metainfo', 'employees'],\n  'dorks': ['login_pages', 'admin_panels', 'dashboard_pages',\
      \ 'stackoverflow', 'social_media', 'project_management', 'code_sharing', 'config_files',\
      \ 'jenkins', 'wordpress_files', 'php_error', 'exposed_documents', 'db_files',\
      \ 'git_exposed'],\n  'intensity': 'normal',\n  'documents_limit': 50\n}\ndir_file_fuzz:\
      \ {\n  'auto_calibration': true,\n  'enable_http_crawl': true,\n  'rate_limit':\
      \ 150,\n  'extensions': ['html', 'php','git','yaml','conf','cnf','config','gz','env','log','db','mysql','bak','asp','aspx','txt','conf','sql','json','yml','pdf'],\n\
      \  'follow_redirect': false,\n  'max_time': 0,\n  'match_http_status': [200,\
      \ 204],\n  'recursive_level': 2,\n  'stop_on_error': false,\n  'timeout': 5,\n\
      \  'threads': 30,\n  'wordlist_name': 'dicc'\n}\nfetch_url: {\n  'uses_tools':\
      \ ['gospider', 'hakrawler', 'waybackurls', 'katana', 'gau'],\n  'remove_duplicate_endpoints':\
      \ true,\n  'duplicate_fields': ['content_length', 'page_title'],\n  'enable_http_crawl':\
      \ true,\n  'gf_patterns': ['debug_logic', 'idor', 'interestingEXT', 'interestingparams',\
      \ 'interestingsubs', 'lfi', 'rce', 'redirect', 'sqli', 'ssrf', 'ssti', 'xss'],\n\
      \  'ignore_file_extensions': ['png', 'jpg', 'jpeg', 'gif', 'mp4', 'mpeg', 'mp3'],\n\
      \  'threads': 30\n}\nvulnerability_scan: {\n  'run_nuclei': true,\n  'run_dalfox':\
      \ true,\n  'run_crlfuzz': true,\n  'enable_http_crawl': true,\n  'concurrency':\
      \ 50,\n  'intensity': 'normal',\n  'rate_limit': 150,\n  'retries': 1,\n  'timeout':\
      \ 5,\n  'fetch_gpt_report': false,\n  'nuclei': {\n    'use_nuclei_config':\
      \ false,\n    'severities': ['unknown', 'info', 'low', 'medium', 'high', 'critical']\n\
      \  }\n}\nwaf_detection: {}\nwaf_bypass: {\n  'use_nuclei': true,\n  'use_benchmarking':\
      \ true\n}\nscreenshot: {\n  'enable_http_crawl': true,\n  'intensity': 'normal',\n\
      \  'timeout': 10,\n  'threads': 40\n}\nbrute_force_scan: {\n  'users_wordlist':\
      \ ['top_default_usernames.txt', 'most_common_usernames.txt'],\n  'pass_wordlist':\
      \ ['top_default_passwords.txt', 'most_common_passwords.txt'],\n  'service':\
      \ 'http',\n  'stop_on_success': true\n}\nfirewall_vpn_scan: {\n  'run_ike_scan':\
      \ true,\n  'threads': 20\n}\nspiderfoot_scan: {\n  'modules': 'all',\n  # 'intensity': 'normal',\n  # 'threads': 10\n}\nweb_api_discovery: {\n  'uses_tools': ['kiterunner', 'arjun', 'linkfinder', 'paramspider', 'inql', 'aquatone', 'semgrep'],\n  'scan_only_active': true,\n  'threads': 30,\n  'kiterunner_wordlist': 'routes-large.kite'\n}"
  model: scanEngine.enginetype
  pk: 1
