- fields:
    default_engine: true
    engine_name: Firewall and VPN (Sophos)
    yaml_configuration: "subdomain_discovery: {\n  'uses_tools': ['subfinder'],
      \n  'enable_http_crawl': true,\n  'threads': 10,\n  'timeout': 5\n}\n\
      port_scan: {\n  'enable_http_crawl': true,\n  'timeout': 5,\n  'ports':\
      \ ['80', '443', '4444', '8443', '22', '500', '4500', '1194'],\n  'rate_limit':\
      \ 100,\n  'threads': 20,\n  'passive': false,\n  'enable_nmap': true,
      \n  'nmap_cmd': '-sV --script vuln'\n}\nvulnerability_scan: {\n  'run_nuclei':\
      \ true,\n  'run_dalfox': false,\n  'run_crlfuzz': false,\n  'run_s3scanner':\
      \ false,\n  'enable_http_crawl': true,\n  'concurrency': 20,\n  'intensity':\
      \ 'normal',\n  'rate_limit': 100,\n  'retries': 1,\n  'timeout': 5,\n\
      \  'fetch_gpt_report': false,\n  'nuclei': {\n    'use_nuclei_config': false,
      \n    'severities': ['medium', 'high', 'critical'],\n    'tags': ['sophos',\
      \ 'firewall', 'vpn'],\n    'custom_templates': ['/root/nuclei-templates/']
      \n  }\n}\nfirewall_vpn_scan: {\n  'run_ike_scan': true,\n  'run_sslscan':\
      \ true,\n  'ports': [443, 4444, 8443]\n}\n\nbrute_force_scan: {\n\
      \  'users_wordlist': ['top_default_usernames.txt', 'most_common_usernames.txt'],
      \n  'pass_wordlist': ['top_default_passwords.txt', 'most_common_passwords.txt'],
      \n  'service': 'http',\n  'stop_on_success': true\n}\nspiderfoot_scan: {\n  'modules': 'all',\n  # 'intensity': 'normal',\n  # 'threads': 10\n}"
  model: scanEngine.enginetype
  pk: 7
