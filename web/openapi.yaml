            type: integer
            maximum: 255
            minimum: 0
            x-nullable: true
          expires:
            title: Expires Datetime
            description: Datetime after which the schedule will no longer trigger
              the task to run
            type: string
            format: date-time
            x-nullable: true
          expire_seconds:
            title: Expires timedelta with seconds
            description: Timedelta with seconds which the schedule will no longer
              trigger the task to run
            type: integer
            maximum: 2147483647
            minimum: 0
            x-nullable: true
          one_off:
            title: One-off Task
            description: If True, the schedule will only run the task a single time
            type: boolean
          start_time:
            title: Start Datetime
            description: Datetime when the schedule should begin triggering the task
              to run
            type: string
            format: date-time
            x-nullable: true
          enabled:
            title: Enabled
            description: Set to False to disable the schedule
            type: boolean
          last_run_at:
            title: Last Run Datetime
            description: Datetime that the schedule last triggered the task to run.
              Reset to None if enabled is set to False.
            type: string
            format: date-time
            readOnly: true
          total_run_count:
            title: Total Run Count
            description: Running count of how many times the schedule has triggered
              the task
            type: integer
            readOnly: true
          date_changed:
            title: Last Modified
            description: Datetime that this PeriodicTask was last modified
            type: string
            format: date-time
            readOnly: true
          description:
            title: Description
            description: Detailed description about the details of this Periodic Task
            type: string
          interval:
            required:
            - every
            - period
            type: object
            properties:
              id:
                title: ID
                type: integer
                readOnly: true
              every:
                title: Number of Periods
                description: Number of interval periods to wait before running the
                  task again
                type: integer
                maximum: 2147483647
                minimum: 1
              period:
                title: Interval Period
                description: 'The type of period between task runs (Example: days)'
                type: string
                enum:
                - days
                - hours
                - minutes
                - seconds
                - microseconds
            readOnly: true
